name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

env:
  NXF_VER: "24.10.6"
  NXF_ANSI_LOG: "false"

jobs:
  # Verifies every profile resolves with the expected process_high envelope and
  # that the kb_count override params are wired through. Fast (~30s, no Docker).
  lint-config:
    name: Lint nextflow config (local | hpc | aws)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: ${{ env.NXF_VER }}
      - name: Resolve each compute profile
        run: |
          set -euo pipefail
          for p in local hpc aws; do
            echo "::group::profile=$p"
            nextflow config -profile "$p"
            echo "::endgroup::"
            nextflow config -profile "$p" | grep -q "kb_threads_full"
            nextflow config -profile "$p" | grep -q "bustools_mem_cap_gb"
          done
      - name: Resolve container profiles
        run: |
          nextflow config -profile docker
          nextflow config -profile singularity

  # Stub-run the full DAG (no real fastqs, no real index) to catch any
  # workflow/include/process-wiring regressions. Runs for both --workflow quick
  # and --workflow full so the nac-mode branch is exercised too.
  stub-run:
    name: Stub run (${{ matrix.workflow }} mode)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workflow: [quick, full]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: ${{ env.NXF_VER }}
      - name: Stage fake inputs (stub mode ignores file contents)
        run: |
          set -euo pipefail
          mkdir -p test_data ref
          touch test_data/SRR21064278_R1.fastq.gz test_data/SRR21064278_R2.fastq.gz
          touch ref/index.idx     ref/t2g.txt
          touch ref/index_nac.idx ref/t2g_nac.txt ref/cdna_t2c.txt ref/nascent_t2c.txt
      - name: Stub run (quick)
        if: matrix.workflow == 'quick'
        run: |
          nextflow run main.nf -stub-run -profile local \
            --samplesheet test/samplesheet_single.csv \
            --prebuilt_index ref/index.idx --t2g ref/t2g.txt
      - name: Stub run (full / nac)
        if: matrix.workflow == 'full'
        run: |
          nextflow run main.nf -stub-run -profile local \
            --samplesheet test/samplesheet_single.csv \
            --workflow full \
            --prebuilt_index ref/index_nac.idx --t2g ref/t2g_nac.txt \
            --cdna_t2c ref/cdna_t2c.txt --nascent_t2c ref/nascent_t2c.txt
      - name: Verify expected outputs were emitted
        run: |
          set -euo pipefail
          test -f results/group_report.html        || (echo "missing group_report.html"; exit 1)
          test -f results/SRR21064278/SRR21064278_report.html \
              || (echo "missing per-sample report"; exit 1)
          test -f results/pipeline_info/trace.txt  || (echo "missing trace.txt"; exit 1)
          echo "stub outputs OK"
      - name: Upload report artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stub-run-${{ matrix.workflow }}-debug
          path: |
            .nextflow.log
            results/pipeline_info/
            work/
          retention-days: 7
