# Frozen versions for the original successful run (April 2026, macOS x86_64 host).
# Use this for strict reproduction. envs/scq.yml is the loose-version variant
# that works on cross-platform Docker / Linux builds where some newer bioconda
# versions aren't yet available.
name: scq
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - openjdk=21
  - nextflow=24.10.6
  - kallisto=0.51.1
  - bustools=0.44.1
  - fastp=1.3.3
  - kneed=0.8.6
  - scipy=1.15.2
  - numpy=2.2.6
  - pandas=2.3.3
  - matplotlib=3.8.4
  - plotly=6.7.0
  - jinja2=3.1.6
  - scikit-learn=1.7.2
  - scanpy=1.11.5
  - anndata=0.11.4
  - scrublet=0.2.3
  - celltypist=1.7.1
  - kb-python=0.29.5
  - bbmap
  - sra-tools
